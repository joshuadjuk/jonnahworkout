name: Jonnah Dev Loop

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch:

jobs:
  jonnah-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run lint (if exists)
        run: npm run lint || echo "no lint script"

      - name: Build project
        run: npm run build || echo "build skipped"

      - name: Generate development report
        run: |
          echo "# Jonnah Dev Report" > REPORT.md
          echo "Time: $(date)" >> REPORT.md
          echo "" >> REPORT.md
          echo "## Repo Status" >> REPORT.md
          git status >> REPORT.md
          echo "" >> REPORT.md
          echo "## Dependency Check" >> REPORT.md
          npm outdated >> REPORT.md || true

      - name: Commit changes
        run: |
          git config user.name "Jonnah Bot"
          git config user.email "jonnah@agent.local"
          git checkout -b jonnah-auto-$(date +%s) || git checkout -b jonnah-auto
          git add .
          git commit -m "jonnah: automated development iteration" || echo "no changes"

      - name: Push branch
        run: git push origin HEAD

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "jonnah: automated development iteration"
          title: "Jonnah automated update"
          body: "Automated development update generated by Jonnah dev loop."
          branch: "jonnah-auto"
          base: "main"
